target-version = "py314"
 
line-length = 120
indent-width = 4
 
src = ["src"]
 
[lint]
preview = true
select = [
    "UP",   # pyupgrade
    "I",    # isort
    "E",    # flake8-errors
    "W",    # flake8-warnings
    "F",    # flake8-pyflakes
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "S",    # flake8-bandit
    "BLE",  # flake8-blind-except
    "T20",  # flake8-print
    "T10",  # flake8-debugger
    "PT",   # flake8-pytest-style
    "RUF",  # Ruff
    "DTZ",  # flake8-datetimez
    "ERA",  # eradicate
    "FURB", # refurb
]

ignore = [
    "C408",
    "RUF001",
    "RUF002",
    "RUF003",
    "S110",
]

exclude = [
    "tests/**",
]

fixable = [
    "I",
]
 

[format]
quote-style = "double"
indent-style = "space"
 

[lint.flake8-bandit]
check-typed-exception = true
